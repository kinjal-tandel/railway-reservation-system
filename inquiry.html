<!DOCTYPE html>
<html>
<head>
  <title>Inquiry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Train Inquiry</h1>

<div class="card">

  <select id="from">
    <option>From</option>
    <option>Surat</option>
    <option>Mumbai</option>
    <option>Delhi</option>
  </select>

  <select id="to">
    <option>To</option>
    <option>Mumbai</option>
    <option>Surat</option>
    <option>Delhi</option>
  </select>

  <div class="input-group">
    <input id="inqDate" type="text" required
    onfocus="this.type='date'"
    onblur="if(!this.value)this.type='text'">
    <label>Select Date</label>
  </div>

  <button onclick="showTrains()">Search</button>

  <p id="result"></p>

  <a href="index.html"><button class="back">Back</button></a>

</div>

<script src="script.js"></script>
</body>
</html>
